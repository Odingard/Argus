# Reference labrat config: a multi-agent target — orchestrator + two
# sub-agents on a shared internal network. Phase 3 Agents 6 (Cross-
# Agent Exfiltration) and 7 (Privilege Escalation) need this shape.
name: multi_agent
description: "Orchestrator + two sub-agents over A2A — Phase 3 fixture."

network:
  isolated: true

services:
  - name: orchestrator
    image: python:3.12-slim
    command: ["python", "-c", "print('replace with real orchestrator cmd')"]
    ports:
      - "9100:9100"
    env:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ROLE: "orchestrator"
    restart: "on-failure"

  - name: agent_a
    image: python:3.12-slim
    command: ["python", "-c", "print('sub-agent A')"]
    env:
      ROLE: "sub_agent_a"
      ORCHESTRATOR_URL: "http://orchestrator:9100"
    depends_on:
      - orchestrator
    restart: "on-failure"

  - name: agent_b
    image: python:3.12-slim
    command: ["python", "-c", "print('sub-agent B')"]
    env:
      ROLE: "sub_agent_b"
      ORCHESTRATOR_URL: "http://orchestrator:9100"
    depends_on:
      - orchestrator
    restart: "on-failure"
