name: ARGUS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/
      - name: Format check
        run: ruff format --check src/

  test:
    name: Contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + test deps
        run: |
          pip install -e .
          pip install pytest
      - name: Run contract tests
        # Contract tests enforce the no-fabrication / MAAC-coverage /
        # real-library PoC invariants. They must pass on every PR.
        run: pytest tests/ -q
        env:
          # Avoid hitting the real API from CI — tests are offline.
          ANTHROPIC_API_KEY: "dummy-key-for-offline-contract-tests"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-dist
          path: dist/
